databases:
  - name: chronocare-db
    databaseName: chronocare
    user: chronocare
    plan: free

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: chronocare-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chronocare-db
          property: connectionString
      - key: REDIS_URL
        value: ""            # Redis is optional – app degrades gracefully
      - key: ENABLE_AUTH
        value: "false"
      - key: API_KEYS
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://chronocare-frontend.onrender.com

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: chronocare-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://chronocare-api.onrender.com
