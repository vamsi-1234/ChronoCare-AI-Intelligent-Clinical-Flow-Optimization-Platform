server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — ${NGINX_API_URL} is replaced by envsubst at container start.
    # Use $$ for nginx variables so envsubst does NOT touch them.
    location /api/ {
        proxy_pass ${NGINX_API_URL}/api/;
        proxy_set_header Host $$host;
        proxy_set_header X-Real-IP $$remote_addr;
        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $$scheme;
        # Needed when proxying to an HTTPS upstream (e.g. Render public URL)
        proxy_ssl_server_name on;
    }

    # SPA fallback
    location / {
        try_files $$uri $$uri/ /index.html;
    }
}
