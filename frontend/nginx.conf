server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — ${NGINX_API_URL} and ${NGINX_API_HOST} substituted at container start
    location /api/ {
        proxy_pass ${NGINX_API_URL}/api/;
        # Must send the API hostname, not the frontend hostname, or Render loops back (508)
        proxy_set_header Host ${NGINX_API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
