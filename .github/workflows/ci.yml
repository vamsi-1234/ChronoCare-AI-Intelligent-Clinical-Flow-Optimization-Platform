name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Generate training data & train models
        run: |
          python scripts/generate_data.py --n 2000
          python scripts/train_models.py

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///:memory:
          REDIS_URL: ""
          LOG_LEVEL: WARNING
        run: python -m pytest app/tests/ -q --tb=short

  # ── Frontend type-check & build ───────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

  # ── Docker build smoke-test ───────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t chronocare-api:ci .

      - name: Build frontend image
        run: docker build -t chronocare-frontend:ci ./frontend

      - name: Health-check backend container
        run: |
          docker run -d --name api -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./chronocare.db \
            -e REDIS_URL="" \
            chronocare-api:ci
          sleep 8
          curl -f http://localhost:8000/api/v1/health
          docker stop api
